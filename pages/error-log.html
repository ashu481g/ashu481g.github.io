<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Error Log</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="layout">

	<div id="sidebarContainer"></div>
    
    <main class="main-content">

        <h1>Error Log</h1>

        <section class="chart-card">

            <table>

                <thead>

                    <tr>

                        <th>Date</th>
                        <th>Subject</th>
                        <th>Module</th>
                        <th>Mistake</th>

                    </tr>

                </thead>

                <tbody id="errorLogBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/core.js"></script>

<script>

renderErrors();

function renderErrors() {

    const logs =
        getData(STORAGE_KEYS.errorLogs);

    const body =
        document.getElementById(
            "errorLogBody"
        );

    if (logs.length === 0) {

        body.innerHTML = `
            <tr>
                <td colspan="4">
                    No errors logged yet.
                </td>
            </tr>
        `;

        return;

    }

    logs.forEach(log => {

        const row =
            document.createElement("tr");

        row.innerHTML = `

            <td>
                ${log.date || "-"}
            </td>

            <td>
                ${log.subject || "-"}
            </td>

            <td>
                ${log.module || "-"}
            </td>

            <td>
                ${log.mistake || "-"}
            </td>

        `;

        body.appendChild(row);

    });

}

</script>
<script src="/js/layout.js"></script>

</body>

</html>
