<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Module Analytics</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <h1>Module Analytics</h1>

        <section class="chart-card">

            <table>

                <thead>

                    <tr>

                        <th>Module</th>
                        <th>Hours</th>
                        <th>Sessions</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="moduleAnalyticsBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/core.js"></script>

<script>

renderModules();

function renderModules() {

    const sessions =
        getData(STORAGE_KEYS.sessions);

    const analytics = {};

    sessions.forEach(session => {

        const key = session.module;

        if (!analytics[key]) {

            analytics[key] = {

                module:
                    session.module,

                minutes: 0,

                sessions: 0,

                completed: false

            };

        }

        analytics[key].minutes +=
            session.durationMinutes;

        analytics[key].sessions++;

        if (session.completed)
            analytics[key].completed = true;

    });

    const body =
        document.getElementById(
            "moduleAnalyticsBody"
        );

    Object.values(analytics)
        .forEach(module => {

            const row =
                document.createElement("tr");

            row.innerHTML = `

                <td>${module.module}</td>

                <td>
                    ${(module.minutes/60).toFixed(1)}
                </td>

                <td>${module.sessions}</td>

                <td>
                    ${
                        module.completed
                        ? "Completed"
                        : "In Progress"
                    }
                </td>

            `;

            body.appendChild(row);

        });

}

</script>
<script src="/js/layout.js"></script>

</body>

</html>
