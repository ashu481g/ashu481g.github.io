<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Session History</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <h1>Session History</h1>

        <section class="chart-card">

            <table>

                <thead>

                    <tr>

                        <th>Date</th>
                        <th>Subject</th>
                        <th>Module</th>
                        <th>Type</th>
                        <th>Duration</th>

                    </tr>

                </thead>

                <tbody id="sessionHistoryBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/core.js"></script>

<script>

renderSessions();

function renderSessions() {

    const sessions =
        getData(STORAGE_KEYS.sessions);

    const body =
        document.getElementById(
            "sessionHistoryBody"
        );

    if (sessions.length === 0) {

        body.innerHTML = `
            <tr>
                <td colspan="5">
                    No study sessions yet.
                </td>
            </tr>
        `;

        return;

    }

    sessions
        .slice()
        .reverse()
        .forEach(session => {

            const row =
                document.createElement("tr");

            row.innerHTML = `

                <td>
                    ${new Date(
                        session.startTime
                    ).toLocaleDateString()}
                </td>

                <td>${session.subject}</td>

                <td>${session.module}</td>

                <td>${session.sessionType}</td>

                <td>
                    ${session.durationMinutes}
                    mins
                </td>

            `;

            body.appendChild(row);

        });

}

</script>
<script src="/js/layout.js"></script>

</body>

</html>
