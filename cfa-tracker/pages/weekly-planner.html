<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weekly Planner</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <h1>Weekly Planning</h1>

        <section class="chart-card">

            <h3>Add Weekly Plan</h3>

            <div class="session-grid">

                <div>

                    <label>Subject</label>

                    <select id="planSubject"></select>

                </div>

                <div>

                    <label>Planned Hours</label>

                    <input type="number"
                           id="plannedHours">

                </div>

            </div>

            <button onclick="saveWeeklyPlan()">
                Save Plan
            </button>

        </section>

        <section class="chart-card">

            <h3>Weekly Plan vs Actual</h3>

            <table>

                <thead>

                    <tr>

                        <th>Subject</th>
                        <th>Planned</th>
                        <th>Actual</th>

                    </tr>

                </thead>

                <tbody id="weeklyPlanBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/topics.js"></script>
<script src="../js/core.js"></script>

<script>

initializePlanner();

function initializePlanner() {

    const select =
        document.getElementById(
            "planSubject"
        );

    Object.keys(syllabus)
        .forEach(subject => {

            const option =
                document.createElement("option");

            option.value = subject;

            option.innerText = subject;

            select.appendChild(option);

        });

    renderWeeklyPlans();

}

function saveWeeklyPlan() {

    const plans =
        getData(STORAGE_KEYS.weeklyPlans);

    plans.push({

        subject:
            document.getElementById(
                "planSubject"
            ).value,

        plannedHours:
            Number(
                document.getElementById(
                    "plannedHours"
                ).value
            )

    });

    saveData(
        STORAGE_KEYS.weeklyPlans,
        plans
    );

    renderWeeklyPlans();

}

function renderWeeklyPlans() {

    const body =
        document.getElementById(
            "weeklyPlanBody"
        );

    body.innerHTML = "";

    const plans =
        getData(STORAGE_KEYS.weeklyPlans);

    const sessions =
        getData(STORAGE_KEYS.sessions);

    plans.forEach(plan => {

        let actualMinutes = 0;

        sessions.forEach(session => {

            if (
                session.subject ===
                plan.subject
            ) {

                actualMinutes +=
                    session.durationMinutes;

            }

        });

        const row =
            document.createElement("tr");

        row.innerHTML = `

            <td>${plan.subject}</td>

            <td>${plan.plannedHours}</td>

            <td>
                ${(actualMinutes/60)
                    .toFixed(1)}
            </td>

        `;

        body.appendChild(row);

    });

}

</script>
<script src="/js/layout.js"></script>

</body>

</html>
